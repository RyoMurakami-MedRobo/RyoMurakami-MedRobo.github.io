# Copy this file to BOTH private CV repos as:
#   .github/workflows/trigger-pages-sync.yml
#
# Japanese source: RyoMurakami-MedRobo/-
# English source:  RyoMurakami-MedRobo/CV_RyoMurakami
name: Trigger public CV sync

on:
  push:
    branches: [main]
    paths:
      - main.tex
      - references.bib
      - references_*.bib

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Determine locale
        id: locale
        run: |
          if [ "${{ github.repository }}" = "RyoMurakami-MedRobo/CV_RyoMurakami" ]; then
            echo "value=en" >> "$GITHUB_OUTPUT"
          else
            echo "value=ja" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout public pages repo
        uses: actions/checkout@v4
        with:
          repository: RyoMurakami-MedRobo/RyoMurakami-MedRobo.github.io
          ref: main
          path: pages-repo
          ssh-key: ${{ secrets.PAGES_DEPLOY_KEY }}

      - name: Bump CV sync trigger
        working-directory: pages-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p cv-sync-trigger
          printf '%s %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${{ github.sha }}" > "cv-sync-trigger/${{ steps.locale.outputs.value }}.txt"
          git add "cv-sync-trigger/${{ steps.locale.outputs.value }}.txt"
          git diff --staged --quiet && echo "Trigger already up to date." && exit 0
          git commit -m "Trigger CV sync from ${{ github.repository }}"
          git push