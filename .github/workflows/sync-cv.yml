name: Sync public CV JSON

on:
  workflow_dispatch:
  schedule:
    # Fallback in case either private source repo misses its sync trigger push.
    - cron: '*/15 * * * *'
  push:
    branches: [main]
    paths:
      - cv-sync-trigger/**

concurrency:
  group: sync-public-cv
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Japanese CV source
        uses: actions/checkout@v4
        with:
          repository: RyoMurakami-MedRobo/-
          ref: main
          path: cv-source-ja
          ssh-key: ${{ secrets.CV_DEPLOY_KEY_JA }}

      - name: Fetch English CV source
        uses: actions/checkout@v4
        with:
          repository: RyoMurakami-MedRobo/CV_RyoMurakami
          ref: main
          path: cv-source-en
          ssh-key: ${{ secrets.CV_DEPLOY_KEY_EN }}

      - name: Record source commits
        run: |
          echo "JA_SOURCE_COMMIT=$(git -C cv-source-ja rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "EN_SOURCE_COMMIT=$(git -C cv-source-en rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Build public CV JSON files
        run: |
          CV_LOCALE=ja SOURCE_REPO="RyoMurakami-MedRobo/-" SOURCE_COMMIT="$JA_SOURCE_COMMIT" node scripts/build-cv-public.mjs \
            cv-source-ja/references.bib cv-source-ja/main.tex \
            docs/uploads/cv-public.json
          CV_LOCALE=en SOURCE_REPO="RyoMurakami-MedRobo/CV_RyoMurakami" SOURCE_COMMIT="$EN_SOURCE_COMMIT" node scripts/build-cv-public.mjs \
            cv-source-en/references.bib cv-source-en/main.tex \
            docs/uploads/cv-public-en.json

      - name: Remove legacy raw CV files if present
        run: |
          rm -f docs/uploads/main.tex docs/uploads/references.bib

      - name: Commit and push
        run: |
          if git diff --quiet -- docs/uploads; then
            echo "No CV changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/uploads/cv-public.json
          git add docs/uploads/cv-public-en.json
          git add -u docs/uploads || true
          git commit -m "Update public CV JSON from private 業績リスト repo"
          git push